<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">AdminDash</div>
            <nav>
                <ul>
                    <li>🏠 Dashboard</li>
                    <li>👥 Users</li>
                    <li>📦 Projects</li>
                    <li>📊 Analytics</li>
                    <li>⚙ Settings</li>
                    <li>🚪 Logout</li>
                </ul>
            </nav>
        </aside>

        <!-- HEADER -->
        <header class="header">
            <input type="text" placeholder="Search...">
            <div class="header-right">
                <button>🔔</button>
                <div class="user">
                    <img src="https://i.pravatar.cc/40" alt="Admin">
                    <span>Admin</span>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <section class="overview-cards">
                <div class="card">Users<br><span>1200</span></div>
                <div class="card">Projects<br><span>58</span></div>
                <div class="card">Revenue<br><span>$34K</span></div>
                <div class="card">Alerts<br><span>3</span></div>
            </section>

            <section class="analytics">
                <div class="widget">📈 Chart Placeholder</div>
                <div class="widget">📊 Graph Placeholder</div>
            </section>

        </main>

    </div>
</body>
</html>
